# Development -- macOS (MacBook Pro M1)
#
# Docker Desktop on Mac cannot access audio hardware directly because Docker
# runs inside a Linux VM. Audio is forwarded via PulseAudio TCP.
#
# ONE-TIME HOST SETUP (run these on your Mac, not inside Docker):
# ---------------------------------------------------------------
# 1. Install PulseAudio:
#      brew install pulseaudio
#
# 2. Enable TCP module -- edit the PulseAudio config:
#      echo "load-module module-native-protocol-tcp auth-ip-acl=127.0.0.1 auth-anonymous=1" \
#        >> $(brew --prefix)/etc/pulse/default.pa
#
# 3. Start PulseAudio:
#      pulseaudio --start
#
# 4. Verify it is running:
#      pulseaudio --check && echo "PulseAudio is running"
#
# To stop PulseAudio later: pulseaudio --kill
# ---------------------------------------------------------------
#
# Run the dev container:
#   docker compose -f docker-compose.mac.yml up

services:
  skeleton:
    build: .
    env_file: .env
    environment:
      # Point the container at the PulseAudio TCP server on the Mac host
      - PULSE_SERVER=tcp:host.docker.internal:4713
    volumes:
      - ./logs:/app/logs
      - ./fallback:/app/fallback
